<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>📝 Expression de Besoin (PER) - UFR SES</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
</head>
<body>

  <!-- 🔐 Vérification d'authentification -->
  <script>
    const user = checkAuth();
    if (!user) window.location.href = "login.html";
  </script>

  <header>
    <h1>📝 Expression de Besoin (PER)</h1>
    <a href="index.html" class="back">← Retour au menu</a>
    <a href="login.html" id="logoutBtn" style="font-size: 14px; color: #900;">🔐 Déconnexion</a>
  </header>

  <main>
    <!-- Formulaire PER -->
    <section class="card" id="formSection">
      <h2>Déposer une demande</h2>
      <form id="formPER">
        <label>Nom du demandeur :</label>
        <input type="text" id="demandeur" required />

        <label>Service / Département :</label>
        <select id="service">
          <option value="MIO">MIO</option>
          <option value="Droit">Droit</option>
          <option value="Sociologie">Sociologie</option>
          <option value="Tourisme">Tourisme</option>
          <option value="Économie-Gestion">Économie-Gestion</option>
        </select>

        <label>Objet de la demande :</label>
        <textarea id="objet" required></textarea>

        <label>Montant estimé (FCFA) :</label>
        <input type="number" id="montant" required />

        <button type="submit">Soumettre la demande</button>
      </form>
      <div id="alerte" style="margin-top: 15px; font-weight: bold;"></div>
    </section>

    <!-- Liste des demandes -->
    <section class="card">
      <h2>Liste des demandes en cours</h2>
      <ul id="listePER">
        <li>Aucune demande enregistrée.</li>
      </ul>
    </section>
  </main>

  <!-- 🔒 Protection par rôle -->
  <script>
    const rolesAutorises = ["comptable_matiere", "comptable_finance"];
    if (!rolesAutorises.includes(user.role)) {
      document.getElementById("formSection").style.display = "none";
      document.querySelectorAll("input, textarea, select, button").forEach(el => {
        el.disabled = true;
        el.style.opacity = "0.6";
      });

      const notice = document.createElement("div");
      notice.textContent = `👁️ Lecture seule – Connecté(e) en tant que ${user.role}`;
      notice.style = "background: #fff3cd; color: #856404; padding: 12px; text-align: center; font-weight: bold; margin: 15px 20px; border-radius: 5px;";
      document.querySelector("main").prepend(notice);
    }

    document.getElementById("logoutBtn").addEventListener("click", function() {
      if (confirm("Voulez-vous vous déconnecter ?")) localStorage.removeItem("user");
    });
  </script>

  <!-- 📥 Logique PER avec fetch -->
  <script>
    const API = "https://backend-ufr-ses-i9bo.onrender.com/api/per";
    const listePER = document.getElementById("listePER");
    const alerte = document.getElementById("alerte");

    // Charger les PER depuis le backend
    async function chargerPER() {
      try {
        const res = await fetch(API);
        const data = res.ok ? await res.json() : [];
        listePER.innerHTML = "";
        if (data.length === 0) {
          listePER.innerHTML = "<li>Aucune demande enregistrée.</li>";
        } else {
          data.forEach(per => {
            const li = document.createElement("li");
            li.textContent = `${per.date} – ${per.demandeur} (${per.service}) : ${per.objet} – ${parseFloat(per.montant).toLocaleString()} FCFA [${per.statut}]`;
            listePER.appendChild(li);
          });
        }
      } catch (err) {
        console.error(err);
        listePER.innerHTML = "<li>Impossible de charger les données du serveur.</li>";
      }
    }

    // Soumettre un PER
    document.getElementById("formPER").addEventListener("submit", async e => {
      e.preventDefault();
      const nouvellePER = {
        demandeur: document.getElementById("demandeur").value,
        service: document.getElementById("service").value,
        objet: document.getElementById("objet").value,
        montant: parseFloat(document.getElementById("montant").value),
        date: new Date().toISOString().slice(0,10)
      };

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(nouvellePER)
        });
        if (res.ok) {
          alerte.textContent = "✅ PER soumis avec succès !";
          alerte.style.color = "green";
          document.getElementById("formPER").reset();
          chargerPER();
        } else {
          alerte.textContent = "❌ Erreur lors de la soumission.";
          alerte.style.color = "red";
        }
      } catch (err) {
        console.error(err);
        alerte.textContent = "❌ Impossible de se connecter au serveur.";
        alerte.style.color = "red";
      }
    });

    // Charger les PER au démarrage
    chargerPER();
  </script>

</body>
</html>
