<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>💼 Gestion du Budget - UFR SES</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
</head>
<body>

  <!-- 🔐 Vérification d'authentification -->
  <script>
    const user = checkAuth();
    if (!user) window.location.href = "login.html";
  </script>

  <header>
    <h1>💼 Gestion du Budget Mensuel</h1>
    <a href="index.html" class="back">← Retour au menu</a>
    <a href="login.html" id="logoutBtn" style="font-size: 14px; color: #900;">🔐 Déconnexion</a>
  </header>

  <main>
    <!-- Paramètres du budget -->
    <section class="card">
      <h2>Paramètres du budget</h2>
      <label>
        Budget alloué (FCFA) :
        <input type="number" id="budgetTotal" value="1500000" disabled />
      </label>
      <p><em>Modifiable uniquement par le comptable finance</em></p>
    </section>

    <!-- Résumé en temps réel -->
    <section class="card" id="resumeBudget">
      <h2>Résumé du budget</h2>
      <p><strong>Dépenses totales :</strong> <span id="depenses">0 FCFA</span></p>
      <p><strong>Solde restant :</strong> <span id="solde">1 500 000 FCFA</span></p>
      <p><strong>Statut :</strong> <span id="statut" style="color: green;">✅ Normal</span></p>
    </section>

    <!-- Formulaire de dépense -->
    <section class="card" id="formSection">
      <h2>Ajouter une dépense</h2>
      <form id="formDepense">
        <label>Motif de la dépense :</label>
        <input type="text" id="motif" required />

        <label>Montant (FCFA) :</label>
        <input type="number" id="montant" required />

        <button type="submit">Enregistrer la dépense</button>
      </form>
    </section>

    <!-- Liste des dépenses -->
    <section class="card">
      <h2>Liste des dépenses</h2>
      <ul id="listeDepenses">
        <li>Aucune dépense enregistrée.</li>
      </ul>
    </section>
  </main>

  <!-- 🔒 Protection par rôle -->
  <script>
    // Seul le comptable finance peut saisir
    if (user.role !== "comptable_finance") {
      document.getElementById("formSection").style.display = "none";
      const notice = document.createElement("div");
      notice.textContent = `👀 Mode lecture seule – Connecté(e) en tant que ${user.role}`;
      notice.style = "background: #f0f8ff; color: #003366; padding: 12px; text-align: center; font-weight: bold; margin: 15px 20px; border-radius: 5px; border: 1px solid #b3d9ff;";
      document.querySelector("main").prepend(notice);
    }

    // Déconnexion
    document.getElementById("logoutBtn").addEventListener("click", function(e) {
      if (confirm("Se déconnecter ?")) localStorage.removeItem("user");
    });
  </script>

  <!-- 📈 Script budget -->
  <script>
    const API = "https://backend-ufr-ses-i9bo.onrender.com/api/budget";
    const depensesEl = document.getElementById("depenses");
    const soldeEl = document.getElementById("solde");
    const statutEl = document.getElementById("statut");
    const listeDepenses = document.getElementById("listeDepenses");
    const budgetInput = document.getElementById("budgetTotal");

    async function chargerBudget() {
      try {
        // GET budget total
        const resTotal = await fetch(`${API}/total`);
        const totalData = await resTotal.json();
        const budgetTotal = totalData.total || 1500000;
        budgetInput.value = budgetTotal;

        // GET dépenses
        const resDep = await fetch(`${API}/depenses`);
        const depenses = resDep.ok ? await resDep.json() : [];

        const totalDepenses = depenses.reduce((sum, d) => sum + parseFloat(d.montant), 0);
        const solde = budgetTotal - totalDepenses;

        depensesEl.textContent = `${totalDepenses.toLocaleString()} FCFA`;
        soldeEl.textContent = `${solde.toLocaleString()} FCFA`;

        if (solde < 0) {
          statutEl.textContent = "🔴 Dépassement";
          statutEl.style.color = "red";
        } else if (solde < budgetTotal * 0.2) {
          statutEl.textContent = "⚠️ Attention";
          statutEl.style.color = "orange";
        } else {
          statutEl.textContent = "✅ Normal";
          statutEl.style.color = "green";
        }

        // Affichage historique
        listeDepenses.innerHTML = "";
        if (depenses.length === 0) {
          listeDepenses.innerHTML = "<li>Aucune dépense enregistrée.</li>";
        } else {
          depenses.forEach(d => {
            const li = document.createElement("li");
            li.textContent = `${d.date} : ${d.motif} – ${parseFloat(d.montant).toLocaleString()} FCFA`;
            listeDepenses.appendChild(li);
          });
        }

      } catch (err) {
        console.error("Erreur réseau :", err);
        alert("Impossible de se connecter au serveur.");
      }
    }

    // Ajouter une dépense
    document.getElementById("formDepense").addEventListener("submit", async e => {
      e.preventDefault();
      const motif = document.getElementById("motif").value;
      const montant = document.getElementById("montant").value;
      try {
        const res = await fetch(`${API}/ajouter`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ motif, montant: parseFloat(montant), date: new Date().toISOString().slice(0,10) })
        });
        if (res.ok) {
          alert("✅ Dépense ajoutée !");
          chargerBudget();
          document.getElementById("formDepense").reset();
        } else {
          alert("❌ Erreur lors de l'ajout.");
        }
      } catch (err) {
        console.error(err);
        alert("Impossible de se connecter au serveur.");
      }
    });

    // Charger les données au démarrage
    chargerBudget();
  </script>

</body>
</html>
